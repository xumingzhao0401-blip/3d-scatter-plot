<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D Data Analysis & Interpolation Tool</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: "Segoe UI", "Microsoft YaHei", sans-serif; background-color: #f4f7f9; margin: 0; padding: 20px; }
        .app-container { max-width: 1260px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        
        .table-scroll { max-height: 350px; overflow-y: auto; border: 1px solid #dcdfe6; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f5f7fa; padding: 12px; border: 1px solid #dcdfe6; position: sticky; top: 0; color: #606266; font-size: 13px; z-index: 10; }
        td { border: 1px solid #ebeef5; padding: 0; text-align: center; }
        td input { width: 100%; height: 34px; border: none; text-align: center; font-size: 14px; outline: none; background: transparent; }
        td input:focus { background: #ecf5ff; box-shadow: inset 0 0 0 1px #409eff; }
        td select { width: 95%; font-size: 12px; border: 1px solid #dcdfe6; border-radius: 4px; cursor: pointer; }

        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; padding: 20px; background: #fafafa; border-radius: 10px; border: 1px solid #eee; }
        .control-group { display: flex; flex-direction: column; gap: 8px; background: #fff; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
        .control-group label { font-size: 13px; font-weight: bold; color: #303133; }

        .control-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 500; font-size: 13px; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn-primary { background: #409eff; color: white; }
        .btn-success { background: #67c23a; color: white; }
        .btn-warning { background: #e6a23c; color: white; }
        .btn-info { background: #909399; color: white; }
        .btn-dark { background: #2f3542; color: white; }
        .btn-danger { background: #f56c6c; color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        #plot-container { position: relative; width: 100%; height: 600px; background: #fff; border: 1px solid #eee; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        #plot-display { width: 100%; height: 100%; }
        #plot-container:fullscreen { width: 100vw; height: 100vh; }

        .tip { font-size: 12px; color: #909399; margin-top: 8px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h2 style="margin:0; color:#303133;">3D Data Visualization Tool</h2>
        <p style="color:#909399; font-size: 14px;">X: Speed (um/s) | Y: Load (mN) | Z: Area (um²)</p>
    </header>

    <div class="data-section">
        <div class="table-scroll">
            <table id="inputTable">
                <thead>
                    <tr>
                        <th style="width:50px">#</th>
                        <th>Speed (um/s)</th>
                        <th>Load (mN)</th>
                        <th>Area (um²)</th>
                        <th style="width:130px">Point Color</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="control-panel">
        <div class="control-group">
            <label>Surface Settings</label>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" id="showSurface" checked onchange="updateChart()"> 
                    <label for="showSurface" style="cursor:pointer; font-size:13px">Enable 3D Interpolated Surface</label>
                </div>
                <div style="display:flex; gap:5px">
                    <select id="colorMode" style="flex:1">
                        <option value="perpoint">Individual Point Color</option>
                        <option value="zvalue">Z-Value Color Mapping</option>
                    </select>
                    <input type="color" id="solidColor" value="#409eff">
                </div>
            </div>
        </div>
        <div class="control-group">
            <label>Presentation & Visuals</label>
            <div style="display:flex; gap:10px; align-items:center">
                <span style="font-size:12px">Rotate Spd:</span>
                <input type="range" id="rotateSpeed" min="0.005" max="0.05" step="0.005" value="0.015" style="flex:1">
            </div>
            <div style="display:flex; gap:10px; align-items:center">
                <span style="font-size:12px">Pt Size:</span>
                <input type="number" id="pointSize" value="12" style="width:50px">
                <span style="font-size:12px">Surf Opacity:</span>
                <input type="number" id="surfOpacity" value="0.6" min="0.1" max="1" step="0.1" style="width:50px">
            </div>
        </div>
        <div class="control-group">
            <label>Axis Formatting</label>
            <div class="tip">SI Prefixes Disabled (90 stays 90, not 90k).</div>
            <div class="tip">All labels set to English.</div>
        </div>
    </div>

    <div class="control-bar">
        <button class="btn btn-primary" onclick="updateChart()">⚡ Refresh Plot</button>
        <button class="btn btn-info" id="rotateBtn" onclick="toggleRotation()">🔄 Auto Rotate</button>
        <button class="btn btn-dark" onclick="toggleFullScreen()">🖥️ Fullscreen</button>
        <button class="btn btn-success" onclick="exportToExcel()">📊 Export Excel</button>
        <button class="btn btn-warning" onclick="exportProject()">💾 Export Project</button>
        <button class="btn btn-info" onclick="document.getElementById('fileInput').click()">📂 Import Project</button>
        <button class="btn btn-danger" onclick="clearTable()">🗑️ Clear Data</button>
    </div>
    
    <input type="file" id="fileInput" accept=".3dvis" onchange="importProject(event)">

    <div id="plot-container">
        <div id="plot-display"></div>
    </div>
</div>

<script>
    const tableBody = document.querySelector('#inputTable tbody');
    const TOTAL_ROWS = 50;
    const colorChoices = [['Default', 'panel_default'], ['Red', '#ff4d4f'], ['Blue', '#1890ff'], ['Green', '#52c41a'], ['Gold', '#faad14'], ['Black', '#262626']];

    function initTable() {
        tableBody.innerHTML = '';
        for (let i = 0; i < TOTAL_ROWS; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${i+1}</td>
                <td><input type="text" id="r${i}c0"></td>
                <td><input type="text" id="r${i}c1"></td>
                <td><input type="text" id="r${i}c2"></td>
                <td><select id="r${i}_color"></select></td>`;
            const sel = tr.querySelector('select');
            colorChoices.forEach(([t, v]) => sel.add(new Option(t, v)));
            tableBody.appendChild(tr);
        }
    }

    // IDW Interpolation
    function generateInterpolatedSurface(points, res = 30) {
        if (points.length < 3) return null;
        let xVals = points.map(p => p.x), yVals = points.map(p => p.y);
        let xMin = Math.min(...xVals), xMax = Math.max(...xVals);
        let yMin = Math.min(...yVals), yMax = Math.max(...yVals);

        let gridX = [], gridY = [], gridZ = [];
        for (let i = 0; i <= res; i++) {
            gridX.push(xMin + (xMax - xMin) * (i / res));
            gridY.push(yMin + (yMax - yMin) * (i / res));
        }

        for (let j = 0; j <= res; j++) {
            let rowZ = [];
            for (let i = 0; i <= res; i++) {
                let xi = gridX[i], yi = gridY[j];
                let num = 0, den = 0, found = null;
                for (let p of points) {
                    let d = Math.sqrt((xi - p.x)**2 + (yi - p.y)**2);
                    if (d < 0.0001) { found = p.z; break; }
                    let w = 1 / (d**2);
                    num += p.z * w; den += w;
                }
                rowZ.push(found !== null ? found : (num / den));
            }
            gridZ.push(rowZ);
        }
        return { x: gridX, y: gridY, z: gridZ };
    }

    function updateChart() {
        const points = [];
        const globalColor = document.getElementById('solidColor').value;
        const mode = document.getElementById('colorMode').value;
        const ptColors = [];

        for (let i = 0; i < TOTAL_ROWS; i++) {
            let vx = parseFloat(document.getElementById(`r${i}c0`).value);
            let vy = parseFloat(document.getElementById(`r${i}c1`).value);
            let vz = parseFloat(document.getElementById(`r${i}c2`).value);
            if (!isNaN(vx) && !isNaN(vy) && !isNaN(vz)) {
                points.push({x: vx, y: vy, z: vz});
                let c = document.getElementById(`r${i}_color`).value;
                ptColors.push(c === 'panel_default' ? globalColor : c);
            }
        }
        if (points.length === 0) return;

        const traces = [];
        // 1. 3D Scatter Trace
        traces.push({
            x: points.map(p => p.x), y: points.map(p => p.y), z: points.map(p => p.z),
            mode: 'markers', type: 'scatter3d', name: 'Measured Points',
            marker: {
                size: document.getElementById('pointSize').value,
                color: mode === 'zvalue' ? points.map(p => p.z) : ptColors,
                colorscale: mode === 'zvalue' ? 'Viridis' : null,
                opacity: 1, line: { width: 1, color: '#fff' }
            },
            hovertemplate: 'Speed: %{x} um/s<br>Load: %{y} mN<br>Area: %{z} um²<extra></extra>'
        });

        // 2. 3D Interpolated Surface Trace
        if (document.getElementById('showSurface').checked && points.length >= 3) {
            const surf = generateInterpolatedSurface(points);
            traces.push({
                x: surf.x, y: surf.y, z: surf.z,
                type: 'surface', name: 'Interpolated Surface',
                opacity: document.getElementById('surfOpacity').value,
                showscale: false,
                colorscale: [[0, 'rgba(200,200,200,0.2)'], [1, 'rgba(100,100,100,0.5)']]
            });
        }

        // Axis formatting (English only, no SI prefix)
        const axisStyle = {
            exponentformat: 'none', 
            tickformat: '', 
            titlefont: { size: 14 },
            tickfont: { size: 12 }
        };

        const layout = {
            scene: {
                xaxis: { title: 'Speed (um/s)', ...axisStyle },
                yaxis: { title: 'Load (mN)', ...axisStyle },
                zaxis: { title: 'Area (um²)', ...axisStyle },
                camera: { eye: { x: 1.8, y: 1.8, z: 1.2 } }
            },
            margin: { l: 0, r: 0, b: 0, t: 30 },
            showlegend: false
        };

        Plotly.newPlot('plot-display', traces, layout, { responsive: true, displaylogo: false });
    }

    let isRotating = false, rotationTimer = null, angle = 0;
    function toggleRotation() {
        const btn = document.getElementById('rotateBtn');
        isRotating = !isRotating;
        if (isRotating) {
            btn.innerText = "🛑 Stop Rotation"; btn.style.background = "#f56c6c";
            rotationTimer = setInterval(() => {
                angle += parseFloat(document.getElementById('rotateSpeed').value);
                Plotly.relayout('plot-display', { 'scene.camera.eye': { x: 2.2 * Math.cos(angle), y: 2.2 * Math.sin(angle), z: 1.2 } });
            }, 40);
        } else {
            btn.innerText = "🔄 Auto Rotate"; btn.style.background = "#909399";
            clearInterval(rotationTimer);
        }
    }

    function toggleFullScreen() {
        const elem = document.getElementById('plot-container');
        if (!document.fullscreenElement) elem.requestFullscreen();
        else document.exitFullscreen();
    }
    document.addEventListener('fullscreenchange', () => Plotly.Plots.resize('plot-display'));

    function exportToExcel() {
        const data = [["#", "Speed (um/s)", "Load (mN)", "Area (um²)", "Color"]];
        for (let i = 0; i < TOTAL_ROWS; i++) {
            const row = [document.getElementById(`r${i}c0`).value, document.getElementById(`r${i}c1`).value, document.getElementById(`r${i}c2`).value];
            if (row.some(v => v !== '')) data.push([i+1, ...row, document.getElementById(`r${i}_color`).value]);
        }
        XLSX.writeFile({SheetNames: ["Data"], Sheets: {"Data": XLSX.utils.aoa_to_sheet(data)}}, `Data_Export_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    function exportProject() {
        const data = Array.from({length: TOTAL_ROWS}, (_, i) => ({
            x: document.getElementById(`r${i}c0`).value, y: document.getElementById(`r${i}c1`).value,
            z: document.getElementById(`r${i}c2`).value, c: document.getElementById(`r${i}_color`).value
        }));
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `Project_${Date.now()}.3dvis`; a.click();
    }

    function importProject(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const p = JSON.parse(ev.target.result);
            p.forEach((row, i) => {
                if (i < TOTAL_ROWS) {
                    document.getElementById(`r${i}c0`).value = row.x; document.getElementById(`r${i}c1`).value = row.y;
                    document.getElementById(`r${i}c2`).value = row.z; document.getElementById(`r${i}_color`).value = row.c;
                }
            });
            updateChart();
        };
        reader.readAsText(e.target.files[0]);
    }

    function clearTable() { if(confirm('Clear all data?')) { initTable(); Plotly.purge('plot-display'); } }

    document.addEventListener('paste', (e) => {
        const text = (e.clipboardData || window.clipboardData).getData('text');
        text.trim().split(/\r?\n/).forEach((row, i) => {
            row.split('\t').forEach((val, j) => { if (j < 3 && i < TOTAL_ROWS) document.getElementById(`r${i}c${j}`).value = val.trim(); });
        });
    });

    initTable();
</script>
</body>
</html>
